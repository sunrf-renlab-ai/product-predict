<script>
  // -------- Standalone host bridge --------
  // The Tweaks panel in tweaks-panel.jsx talks to an external "host" via postMessage:
  //   panel posts:    __edit_mode_available / __edit_mode_dismissed / __edit_mode_set_keys
  //   panel listens:  __activate_edit_mode / __deactivate_edit_mode
  // In standalone (window.parent === window) we shim the host:
  //  - reply to __edit_mode_available with __activate_edit_mode so the panel opens
  //  - reply to __edit_mode_dismissed with __deactivate_edit_mode so the close button works
  //  - __edit_mode_set_keys is a no-op (the in-page state already updated via setValues)
  (function () {
    var standalone = window.parent === window;
    if (!standalone) return;
    var launcher = document.getElementById('__tweaks-launcher');
    var open = false;
    window.addEventListener('message', function (e) {
      var t = e && e.data && e.data.type;
      if (t === '__edit_mode_available') {
        // Auto-open the panel a moment after the app mounts so the loading screen has cleared.
        setTimeout(function () { window.postMessage({ type: '__activate_edit_mode' }, '*'); open = true; }, 250);
      } else if (t === '__edit_mode_dismissed') {
        window.postMessage({ type: '__deactivate_edit_mode' }, '*');
        open = false;
      } else if (t === '__activate_edit_mode') {
        open = true;
      } else if (t === '__deactivate_edit_mode') {
        open = false;
      }
    });
    launcher.addEventListener('click', function () {
      window.postMessage({ type: open ? '__deactivate_edit_mode' : '__activate_edit_mode' }, '*');
      open = !open;
    });
  })();

  // Loading screen — strip once React mounts.
  // React 18 createRoot wipes #root contents on first render, which removes the
  // loader naturally, so this observer is belt-and-suspenders for slow connections.
  var __ld = document.getElementById('__loading');
  var __obs = new MutationObserver(function () {
    var root = document.getElementById('root');
    if (!root) return;
    if (!root.contains(__ld) || root.children.length > 1) {
      if (__ld && __ld.parentNode) __ld.parentNode.removeChild(__ld);
      __obs.disconnect();
    }
  });
  __obs.observe(document.getElementById('root'), { childList: true, subtree: true });
</script>
