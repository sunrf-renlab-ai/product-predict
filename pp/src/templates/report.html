<style>
  :root {
    --bg: #0d0d0c;
    --bg-1: #131311;
    --bg-2: #1a1a17;
    --bg-3: #232320;
    --line: #2a2a26;
    --line-2: #353530;
    --fg: #f0ede3;
    --fg-1: #d4d0c4;
    --fg-2: #8a877d;
    --fg-3: #56544c;
    --accent: oklch(0.88 0.18 118);
    --accent-dim: oklch(0.88 0.18 118 / 0.15);
    --accent-fg: #0d0d0c;
    --danger: oklch(0.72 0.18 28);
    --warn: oklch(0.82 0.14 75);
    --good: oklch(0.82 0.14 155);
    --neutral: oklch(0.75 0.04 240);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Geist', system-ui, sans-serif; font-feature-settings: "ss01", "ss02", "cv11"; }
  body { min-height: 100vh; overflow: hidden; }
  ::selection { background: var(--accent); color: var(--accent-fg); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "ss02", "ss03", "zero"; }
  .serif { font-family: 'Instrument Serif', serif; }

  button { font-family: inherit; cursor: pointer; border: 0; background: transparent; color: inherit; padding: 0; }
  input, textarea { font-family: inherit; color: inherit; background: transparent; border: 0; outline: 0; }

  #root { height: 100vh; }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.012) 1px, transparent 0);
    background-size: 3px 3px;
    mix-blend-mode: overlay;
  }

  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  .cursor-blink { animation: blink 1s steps(2) infinite; }
  @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.4); opacity: 0; } }
  .pulse-ring { animation: pulse-ring 1.8s ease-out infinite; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .shimmer { background: linear-gradient(90deg, transparent 0%, var(--accent-dim) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2s linear infinite; }
  @keyframes fade-in-up { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in-up { animation: fade-in-up 0.4s ease-out backwards; }
  @keyframes slide-in { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  .slide-in { animation: slide-in 0.3s ease-out backwards; }
</style>
</head>

<!-- Data shim — fans out __PP_RUN__ into the globals the JSX expects. -->
<script>
// Data shim — exposes the globals the prototype JSX expects (PROJECT, AGENTS,
// ACTIVITY, ISSUES, DELIGHTS, SENTIMENT_CURVE, ROUTES_HEAT, PAST_RUNS, RUN_META)
// sourced from window.__PP_RUN__ (a real run.json injected by report.ts).
//
// When __PP_RUN__ is null we fall back to a minimal placeholder so the viewer
// still renders an empty state instead of crashing.
(function () {
  var R = window.__PP_RUN__;
  if (!R) {
    window.PROJECT = { name: "(no run)", description: "Load a run.json to populate this view." };
    window.AGENTS = [];
    window.ACTIVITY = [];
    window.ISSUES = [];
    window.DELIGHTS = [];
    window.SENTIMENT_CURVE = [];
    window.ROUTES_HEAT = [];
    window.PAST_RUNS = [];
    window.RUN_META = null;
    return;
  }

  window.PROJECT = {
    name: R.target.title || R.target.url,
    org: hostOf(R.target.url),
    branch: "—",
    commit: shortId(R.id),
    stack: ["Web"],
    description: R.target.url,
    pages: countPages(R),
    components: 0,
    routes: (R.routesHeat || []).map(function (r) { return r.path; }),
  };

  window.AGENTS = R.agents || [];
  window.ACTIVITY = R.activity || [];
  window.ISSUES = R.issues || [];
  window.DELIGHTS = R.delights || [];
  window.FEATURES = R.features || [];
  window.SENTIMENT_CURVE = R.sentimentCurve || [];
  window.ROUTES_HEAT = R.routesHeat || [];
  // Single-run viewer — recent runs is just this one for now.
  window.PAST_RUNS = [{
    id: "r-" + shortId(R.id),
    name: R.target.title || R.target.url,
    branch: "—",
    commit: shortId(R.id),
    agents: (R.agents || []).length,
    status: "done",
    time: fmtRelative(R.finishedAt),
    score: R.metrics ? R.metrics.predictedNps : null,
  }];

  window.RUN_META = R;

  function hostOf(url) {
    try { return new URL(url).host; } catch { return "—"; }
  }
  function countPages(r) {
    var paths = new Set();
    (r.activity || []).forEach(function (e) {
      if (e.url) { try { paths.add(new URL(e.url).pathname); } catch {} }
    });
    return paths.size || (r.routesHeat || []).length;
  }
  function shortId(id) { return String(id || "").replace(/^run-/, ""); }
  function fmtRelative(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    var min = Math.round((Date.now() - d.getTime()) / 60000);
    if (min < 1) return "just now";
    if (min < 60) return min + " min ago";
    var hr = Math.round(min / 60);
    if (hr < 24) return hr + " hr ago";
    return Math.round(hr / 24) + " days ago";
  }
})();
</script>
