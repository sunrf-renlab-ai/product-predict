name: Deploy web → Vercel

# Push to main / PR against main triggers a production / preview deploy of
# web/. pp/ changes do NOT trigger a deploy — this is a monorepo with the
# Next.js app in a sub-directory and the CLI as a separate artifact.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    # NOTE: pass VERCEL_TOKEN via env (CLI reads it natively). Passing
    # `--token "${{ secrets.X }}"` confuses GitHub's log redactor, which
    # masks "--" sequences inside the rendered command line and corrupts
    # the flag name as Vercel parses it.
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production for main, preview otherwise)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel pull --yes --environment=preview
          else
            vercel pull --yes --environment=production
          fi

      - name: Build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            vercel build
          else
            vercel build --prod
          fi

      - name: Deploy
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            URL=$(vercel deploy --prebuilt)
            echo "Preview: $URL"
          else
            URL=$(vercel deploy --prebuilt --prod)
            echo "Production: $URL"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test (production only)
        if: github.event_name != 'pull_request'
        run: |
          sleep 5
          for path in / /demo /api/health; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://product-predict.vercel.app$path")
            echo "$path -> $code"
            [ "$code" = "200" ] || exit 1
          done
