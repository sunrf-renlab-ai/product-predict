<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pulse — Inbox</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c10; color: #e7e9ee; font: 14px/1.5 -apple-system, "Inter", "Segoe UI", sans-serif; }
  .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .side { background: #0d1015; border-right: 1px solid #1a1d22; padding: 22px 14px; }
  .brand { font-weight: 600; padding: 4px 10px 20px; letter-spacing: -0.01em; }
  .side-item { padding: 8px 10px; border-radius: 6px; color: #97a0ac; font-size: 13px; cursor: pointer; }
  .side-item.active { background: #181c23; color: #e7e9ee; }
  .main { padding: 28px 36px; }
  .head { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1a1d22; padding-bottom: 16px; margin-bottom: 14px; }
  .head h1 { font-size: 22px; letter-spacing: -0.01em; }
  .head .meta { color: #6a7180; font-size: 13px; }
  /* No grouping by type, no bulk action button — just a flat list */
  .list { display: flex; flex-direction: column; }
  .row { display: grid; grid-template-columns: 24px 1fr 120px 60px; gap: 14px; align-items: center; padding: 12px 8px; border-bottom: 1px solid #14171c; cursor: pointer; }
  .row:hover { background: #0e1116; }
  .row .dot { width: 8px; height: 8px; border-radius: 50%; background: #5b8def; margin-left: 8px; }
  .row.read .dot { background: transparent; border: 1px solid #2a2f38; }
  .row .body { font-size: 13px; color: #d3d7de; }
  .row .body small { color: #6a7180; }
  .row .time { color: #6a7180; font-size: 12px; text-align: right; }
  .row .kind { font-size: 11px; color: #6a7180; text-transform: uppercase; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">◆ Pulse</div>
    <div class="side-item">Home</div>
    <div class="side-item active">Inbox</div>
    <div class="side-item">Projects</div>
    <div class="side-item">Calendar</div>
    <div class="side-item">Search</div>
    <div class="side-item">Settings</div>
  </aside>
  <main class="main">
    <div class="head">
      <h1>Inbox</h1>
      <div class="meta">50 notifications</div>
    </div>
    <div class="list" id="list"></div>
  </main>
</div>
<script>
  // Mixed types interleaved, no grouping. Time format inconsistent (relative vs ISO).
  const items = [
    { k: 'mention', b: '<b>@maya</b> mentioned you in <i>Q3 roadmap</i>', t: '3 hours ago' },
    { k: 'system', b: 'New device signed in from Brooklyn, NY', t: '2026-05-25 14:23' },
    { k: 'digest', b: 'Weekly digest: 12 new comments, 4 new tasks', t: '5 hours ago' },
    { k: 'mention', b: '<b>@tom</b> replied to your comment on <i>Pricing v2</i>', t: '2026-05-25 11:08' },
    { k: 'system', b: 'Billing: card ending 4242 will be charged in 3 days', t: 'yesterday' },
    { k: 'digest', b: 'Daily summary: you have 7 unread threads', t: '2026-05-24 22:00' },
    { k: 'mention', b: '<b>@alex</b> assigned <i>Fix login bug</i> to you', t: '12 hours ago' },
    { k: 'system', b: 'Storage 82% full — consider archiving', t: '2026-05-24 09:14' },
    { k: 'mention', b: '<b>@priya</b> added you to <i>Design crit</i>', t: 'yesterday' },
    { k: 'digest', b: 'Top contributors this week: maya, tom, alex', t: '2026-05-23 18:30' },
    { k: 'system', b: 'Integration error: Slack token expired', t: '2 days ago' },
    { k: 'mention', b: '<b>@jordan</b> requested your review on <i>API v4</i>', t: '2026-05-23 15:12' },
    { k: 'digest', b: 'New: 4 docs shared with you this week', t: '3 days ago' },
    { k: 'system', b: 'Workspace updated to plan: Team', t: '2026-05-22 10:01' },
    { k: 'mention', b: '<b>@eric</b> liked your update in <i>#general</i>', t: '4 days ago' },
    { k: 'system', b: 'Reminder: Stand-up in 15 minutes', t: '2026-05-22 08:45' },
    { k: 'mention', b: '<b>@sam</b> shared <i>Onboarding flow</i> with you', t: '5 days ago' },
    { k: 'digest', b: 'Inactive members: 3 teammates haven\'t logged in for 2 weeks', t: '2026-05-21 16:20' },
    { k: 'system', b: 'Two-factor auth was enabled', t: '6 days ago' },
    { k: 'mention', b: '<b>@maya</b> commented on <i>Q3 roadmap</i>', t: '2026-05-21 09:33' }
  ];
  // Pad to 50 by recycling
  while (items.length < 50) items.push({ ...items[items.length % 20] });
  const list = document.getElementById('list');
  items.forEach((it, idx) => {
    const r = document.createElement('div');
    r.className = 'row' + (idx > 12 ? ' read' : '');
    r.innerHTML = `<div class="dot"></div><div class="body">${it.b}<br><small class="kind">${it.k}</small></div><div class="time">${it.t}</div><div></div>`;
    // Clicking opens in a brand new tab — breaks workflow
    r.onclick = () => window.open('about:blank', '_blank');
    list.appendChild(r);
  });
</script>
</body>
</html>
