<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Create your Cinder account</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b0d11; color: #e7e9ee; font: 14px/1.45 -apple-system, "Inter", "Segoe UI", sans-serif; min-height: 100vh; display: grid; place-items: center; padding: 32px; }
  .card { width: 100%; max-width: 520px; background: #11141a; border: 1px solid #1e222a; border-radius: 12px; padding: 32px; }
  .brand { font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; }
  h1 { font-size: 22px; letter-spacing: -0.01em; }
  .sub { color: #97a0ac; font-size: 13px; margin-top: 4px; }
  form { margin-top: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .full { grid-column: 1 / -1; }
  /* label is faked via placeholder — disappears on focus/input */
  input, select { width: 100%; padding: 11px 12px; background: #0b0d11; border: 1px solid #2a2f38; border-radius: 6px; color: #e7e9ee; font: inherit; outline: none; }
  input::placeholder, select { color: #6a7180; }
  input:focus, select:focus { border-color: #5b8def; }
  /* generic error pill, no per-field hint */
  .err { display: none; grid-column: 1 / -1; padding: 10px 12px; background: #2a1418; border: 1px solid #5a2027; color: #f3c2c8; border-radius: 6px; font-size: 13px; margin-top: 4px; }
  .err.show { display: block; }
  button.submit { grid-column: 1 / -1; margin-top: 8px; padding: 12px; background: #5b8def; border: 0; border-radius: 6px; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; }
  .legal { margin-top: 14px; color: #6a7180; font-size: 11px; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">◆ Cinder</div>
  <h1>Create your account</h1>
  <p class="sub">Get started in seconds — no credit card needed.</p>

  <form id="f" novalidate>
    <input name="first" placeholder="First name" required />
    <input name="last"  placeholder="Last name" required />
    <input class="full" name="email" type="email" placeholder="Work email" required />
    <input name="company" placeholder="Company" required />
    <select name="size" required>
      <option value="">Company size</option>
      <option>1–5</option><option>6–20</option><option>21–100</option><option>100+</option>
    </select>
    <input name="role" placeholder="Job title" required />
    <input name="phone" type="tel" placeholder="Phone (for verification)" required />
    <input class="full" name="password" type="password" placeholder="Password" required />
    <div class="err" id="err">Invalid input. Please check your entries.</div>
    <button class="submit" id="submit" type="submit">Create account</button>
  </form>
  <p class="legal">By signing up you agree to our Terms and Privacy Policy.</p>
</div>

<script>
  const form = document.getElementById('f');
  const err  = document.getElementById('err');
  const btn  = document.getElementById('submit');
  form.addEventListener('submit', e => {
    e.preventDefault();
    err.classList.remove('show');
    const data = new FormData(form);
    let valid = true;
    for (const [_, v] of data.entries()) if (!String(v).trim()) valid = false;
    const pwd = String(data.get('password') || '');
    if (!/[A-Z]/.test(pwd) || !/\d/.test(pwd) || !/[^a-zA-Z0-9]/.test(pwd) || pwd.length < 12) valid = false;
    if (!valid) {
      // Generic message, no per-field hint, no scroll to first error, no loading state
      err.classList.add('show');
      return;
    }
    // No loading feedback — button stays the same forever
    setTimeout(() => { /* no-op */ }, 2000);
  });
</script>
</body>
</html>
