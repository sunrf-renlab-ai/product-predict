<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contact — Helix</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0e12; color: #e6e8ee; font: 15px/1.5 -apple-system, "Inter", "Segoe UI", sans-serif; min-height: 100vh; }
  a { color: inherit; text-decoration: none; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; border-bottom: 1px solid #1b1e24; }
  .brand { font-weight: 600; letter-spacing: -0.01em; }
  nav { display: flex; gap: 22px; font-size: 13px; color: #9aa1ab; }
  nav a:hover { color: #e6e8ee; cursor: pointer; }
  main { max-width: 560px; margin: 60px auto 80px; padding: 0 28px; }
  /* Title is just "Form" — meaningless */
  h1 { font-size: 28px; letter-spacing: -0.01em; font-weight: 600; margin-bottom: 8px; }
  .lede { color: #9aa1ab; font-size: 14px; margin-bottom: 32px; }
  /* No required-field affordance: no asterisk, no color hint */
  label { display: block; font-size: 13px; color: #b9bec7; margin-bottom: 6px; }
  input, textarea, select {
    width: 100%; padding: 10px 12px; background: #14171c; border: 1px solid #262a31;
    border-radius: 6px; color: #e6e8ee; font: inherit; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: #3a4150; }
  .field { margin-bottom: 18px; }
  /* textarea ships at 40px — barely one line */
  textarea { height: 40px; resize: vertical; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn {
    margin-top: 10px; padding: 10px 18px; background: #5b8def; border: 0;
    border-radius: 6px; color: #fff; font: inherit; font-weight: 500;
    cursor: pointer;
  }
  .btn:hover { background: #6b97f0; }
  footer { padding: 22px 40px; border-top: 1px solid #1b1e24; color: #6a7180; font-size: 12px; text-align: center; }
</style>
</head>
<body>
<header>
  <div class="brand">◆ Helix</div>
  <nav>
    <a>Product</a><a>Docs</a><a>Pricing</a><a>Sign in</a>
  </nav>
</header>

<main>
  <h1>Form</h1>
  <p class="lede">Tell us a bit about yourself and we'll get back to you.</p>

  <form id="contactForm">
    <div class="row">
      <div class="field">
        <label>First name</label>
        <input name="firstName" type="text" />
      </div>
      <div class="field">
        <label>Last name</label>
        <input name="lastName" type="text" />
      </div>
    </div>

    <div class="field">
      <label>Work email</label>
      <input name="email" type="email" />
    </div>

    <div class="field">
      <label>Company</label>
      <input name="company" type="text" />
    </div>

    <div class="field">
      <label>How can we help?</label>
      <select name="topic">
        <option>Sales inquiry</option>
        <option>Technical question</option>
        <option>Partnership</option>
        <option>Other</option>
      </select>
    </div>

    <div class="field">
      <label>Message</label>
      <textarea name="message"></textarea>
    </div>

    <button class="btn" type="submit">Submit</button>
  </form>
</main>

<footer>© 2026 Helix Systems · Privacy · Terms</footer>

<script>
  // Submit handler does nothing visible: no disabled state, no toast, no redirect,
  // no inline confirmation. The button just sits there after click.
  document.getElementById('contactForm').addEventListener('submit', function (e) {
    e.preventDefault();
    // Pretend to send — but provide zero UI feedback.
    // (In a real product this would post() and update UI.)
    fetch('/__noop', { method: 'POST' }).catch(() => {});
    // intentionally: no button text change, no spinner, no banner, no reset.
  });
</script>
</body>
</html>
