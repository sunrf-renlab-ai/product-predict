<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quill — new doc</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b0d10; color: #e7e9ee; font: 15px/1.55 -apple-system, "Inter", "Segoe UI", sans-serif; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid #1c1f24; background: #0e1115; position: sticky; top: 0; }
  .brand { font-weight: 600; }
  .crumb { font-size: 12px; color: #6a7180; margin-left: 10px; }
  .save-state { font-size: 12px; color: #d5a04c; }
  .save-state.saved { color: #6aa86a; }
  .toolbar { display: flex; gap: 8px; }
  /* buttons that LOOK like buttons but are divs without keyboard handlers */
  .tbtn { padding: 6px 10px; font-size: 13px; border-radius: 6px; color: #c8cdd5; cursor: pointer; user-select: none; }
  .tbtn:hover { background: #1c1f24; }
  .save { background: #5b8def; color: #0b0d10; font-weight: 600; padding: 7px 14px; }
  .save:hover { background: #6f9aff; }
  main { max-width: 760px; margin: 40px auto; padding: 0 24px; }
  .title { width: 100%; background: transparent; border: 0; color: #e7e9ee; font: 600 32px/1.2 inherit; letter-spacing: -0.01em; outline: none; padding: 6px 0; }
  .formatbar { display: flex; gap: 4px; margin-top: 16px; padding: 6px; background: #14171c; border: 1px solid #1c1f24; border-radius: 8px; width: fit-content; }
  /* format buttons: divs with no tabindex, no role */
  .fbtn { padding: 4px 10px; font-size: 13px; border-radius: 4px; color: #b9bec7; cursor: pointer; user-select: none; }
  .fbtn:hover { background: #1c1f24; color: #e7e9ee; }
  .fbtn.active { background: #1c1f24; color: #e7e9ee; }
  .editor { margin-top: 16px; min-height: 360px; padding: 12px 0; font-size: 16px; line-height: 1.65; color: #d8dce3; outline: none; }
  .editor:empty::before { content: attr(data-ph); color: #6a7180; }
  /* contenteditable but tabindex=-1 to disable keyboard focus */
  .footer-hint { margin-top: 28px; font-size: 12px; color: #6a7180; }
</style>
</head>
<body>
<header>
  <div style="display: flex; align-items: center;">
    <span class="brand">✒ Quill</span>
    <span class="crumb">My Docs / Untitled</span>
  </div>
  <div class="toolbar">
    <span class="tbtn" onclick="document.execCommand('undo')">Undo</span>
    <span class="tbtn" onclick="document.execCommand('redo')">Redo</span>
    <span class="tbtn" onclick="alert('Share dialog (mock)')">Share</span>
    <span class="save-state" id="state">Unsaved changes</span>
    <span class="tbtn save" onclick="saveDoc()">Save</span>
  </div>
</header>

<main>
  <input class="title" placeholder="Untitled" />
  <div class="formatbar">
    <span class="fbtn" onclick="cmd(this,'bold')"><b>B</b></span>
    <span class="fbtn" onclick="cmd(this,'italic')"><i>I</i></span>
    <span class="fbtn" onclick="cmd(this,'underline')"><u>U</u></span>
    <span class="fbtn" onclick="cmd(this,'insertUnorderedList')">• List</span>
    <span class="fbtn" onclick="cmd(this,'formatBlock','H2')">H2</span>
    <span class="fbtn" onclick="cmd(this,'formatBlock','blockquote')">Quote</span>
    <span class="fbtn" onclick="cmd(this,'insertHorizontalRule')">— Divider</span>
  </div>
  <div class="editor" id="editor" contenteditable="true" tabindex="-1" data-ph="Start writing…"></div>
  <p class="footer-hint">Click Save when you're done. Your edits are not stored until you save.</p>
</main>

<script>
  // intentionally swallow keyboard shortcuts site-wide
  window.addEventListener('keydown', e => {
    if (e.metaKey || e.ctrlKey) {
      // block Cmd+S, Cmd+Enter, Cmd+B etc — no shortcut works
      if (['s', 'Enter', 'b', 'i', 'u', '/', 'k'].includes(e.key)) {
        e.preventDefault();
        e.stopPropagation();
      }
    }
    // disable "?" cheatsheet (there isn't one anyway)
  }, true);

  function cmd(el, c, arg) {
    document.execCommand(c, false, arg || null);
    el.classList.toggle('active');
    markUnsaved();
  }
  function markUnsaved() {
    const s = document.getElementById('state');
    s.textContent = 'Unsaved changes';
    s.classList.remove('saved');
  }
  function saveDoc() {
    const s = document.getElementById('state');
    s.textContent = 'Saved · just now';
    s.classList.add('saved');
  }
  document.getElementById('editor').addEventListener('input', markUnsaved);
  document.querySelector('.title').addEventListener('input', markUnsaved);
</script>
</body>
</html>
