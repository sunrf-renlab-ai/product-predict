<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Helm — workspace</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0c10; color: #e7e9ee; font: 14px/1.45 -apple-system, "Inter", "Segoe UI", sans-serif; height: 100vh; display: grid; grid-template-rows: 80px 1fr; grid-template-columns: 220px 1fr; grid-template-areas: "status status" "side main"; }
  .status { grid-area: status; border-bottom: 1px solid #1a1d22; display: flex; align-items: center; padding: 0 24px; color: #6a7180; font-size: 12px; }
  aside { grid-area: side; border-right: 1px solid #1a1d22; padding: 14px 0; }
  .brand { padding: 0 18px 14px; font-weight: 600; letter-spacing: -0.01em; border-bottom: 1px solid #1a1d22; }
  nav { display: flex; flex-direction: column; padding: 10px 0; }
  nav a { padding: 8px 18px; color: #b8bec7; font-size: 13px; cursor: pointer; }
  nav a:hover { background: #11141a; color: #e7e9ee; }
  nav a.active { background: #11141a; color: #e7e9ee; border-left: 2px solid #5b8def; }
  .nav-meta { padding: 14px 18px 0; color: #6a7180; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  main { grid-area: main; padding: 32px 36px; overflow: auto; }
  .crumb { color: #6a7180; font-size: 12px; }
  h1 { font-size: 22px; letter-spacing: -0.01em; margin-top: 4px; }
  .empty { margin-top: 80px; text-align: center; color: #97a0ac; }
  .empty .icon { width: 56px; height: 56px; border-radius: 16px; background: #11141a; border: 1px solid #1e222a; display: inline-grid; place-items: center; color: #6a7180; font-size: 24px; margin-bottom: 12px; }
  .empty h2 { font-size: 16px; color: #e7e9ee; font-weight: 500; }
  .empty p { margin-top: 6px; font-size: 13px; }
  .footer-help { position: fixed; bottom: 16px; right: 22px; display: flex; gap: 10px; }
  .footer-help a { padding: 6px 10px; font-size: 12px; color: #97a0ac; border: 1px solid #1e222a; border-radius: 6px; background: #11141a; cursor: pointer; }
</style>
</head>
<body>
  <div class="status">Workspace: <span style="color:#e7e9ee;margin-left:6px">Acme Inc</span> · Plan: Pro · Last sync 2 min ago</div>

  <aside>
    <div class="brand">⌖ Helm</div>
    <nav>
      <a class="active">Projects</a>
      <a>Tasks</a>
      <a>Milestones</a>
      <a>Sprints</a>
      <a>Cycles</a>
      <a>Goals</a>
      <a>Reports</a>
      <a>Team</a>
    </nav>
    <div class="nav-meta">Resources</div>
    <nav>
      <a>Help</a>
      <a>Docs</a>
    </nav>
  </aside>

  <main>
    <div class="crumb">Workspace / Projects</div>
    <h1>Projects</h1>

    <div class="empty">
      <div class="icon">▢</div>
      <h2>No projects yet.</h2>
      <p>Your projects will appear here.</p>
    </div>
  </main>

  <div class="footer-help">
    <a>Help</a><a>Docs</a>
  </div>
</body>
</html>
