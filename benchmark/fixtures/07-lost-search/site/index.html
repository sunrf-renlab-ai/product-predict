<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Search — Quill Docs</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0c; color: #e6e8ee; font: 15px/1.5 -apple-system, "Inter", "Segoe UI", sans-serif; }
  a, button { color: inherit; text-decoration: none; cursor: pointer; background: transparent; border: 0; font: inherit; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 40px; border-bottom: 1px solid #1b1e24; }
  .brand { font-weight: 600; letter-spacing: -0.01em; color: #b4ec5b; }
  nav { display: flex; gap: 22px; font-size: 13px; color: #9aa1ab; }
  nav a:hover, nav a.active { color: #e6e8ee; }
  main { max-width: 880px; margin: 50px auto 80px; padding: 0 28px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 18px; letter-spacing: -0.01em; }
  .search-wrap { position: relative; margin-bottom: 14px; }
  /* No clear (×) button, generic placeholder */
  .search-wrap input {
    width: 100%; padding: 12px 14px; background: #14171c; border: 1px solid #262a31;
    border-radius: 8px; color: #e6e8ee; font: inherit; font-size: 15px; outline: none;
  }
  .search-wrap input:focus { border-color: #3a4150; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .chip { padding: 6px 12px; background: #14171c; border: 1px solid #262a31; border-radius: 999px; font-size: 12px; color: #9aa1ab; }
  .chip:hover { color: #e6e8ee; border-color: #3a4150; }
  .chip.on { background: #1a2010; border-color: #b4ec5b; color: #b4ec5b; }
  .stats { font-size: 12px; color: #6a7180; margin-bottom: 14px; }
  .results { display: flex; flex-direction: column; gap: 10px; }
  /* All cards identical — no hierarchy between top hits and weaker matches, no per-category visual grouping */
  .card {
    padding: 14px 16px; background: #14171c; border: 1px solid #1f232a;
    border-radius: 8px; cursor: pointer;
  }
  .card:hover { border-color: #2a2f38; }
  .card .t { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
  .card .s { color: #9aa1ab; font-size: 13px; line-height: 1.45; }
  .card .meta { color: #6a7180; font-size: 11px; margin-top: 6px; }
  /* Empty state intentionally absent in DOM — JS just clears .results to nothing */
  .empty-placeholder { display: none; }
  .doc-view { display: none; padding: 18px 20px; background: #14171c; border: 1px solid #1f232a; border-radius: 8px; }
  .doc-view h2 { font-size: 18px; margin-bottom: 8px; }
  .doc-view p { color: #9aa1ab; font-size: 13px; }
  .doc-view .back { margin-top: 14px; font-size: 12px; color: #b4ec5b; }
  footer { padding: 22px 40px; border-top: 1px solid #1b1e24; color: #6a7180; font-size: 12px; text-align: center; }
</style>
</head>
<body>
<header>
  <div class="brand">✒ Quill</div>
  <nav>
    <a class="active">Docs</a><a>Guides</a><a>API</a><a>Community</a><a>Changelog</a>
  </nav>
</header>

<main>
  <h1>Search</h1>
  <div class="search-wrap">
    <input id="q" type="text" placeholder="Search..." autocomplete="off" />
  </div>
  <div class="chips" id="chips">
    <button class="chip on" data-cat="all">All</button>
    <button class="chip" data-cat="guide">Guides</button>
    <button class="chip" data-cat="api">API</button>
    <button class="chip" data-cat="account">Account</button>
  </div>
  <div class="stats" id="stats">Showing 9 results</div>
  <div class="results" id="results"></div>
  <div class="doc-view" id="docview">
    <h2 id="dv-t"></h2>
    <p id="dv-s"></p>
    <button class="back" id="dv-back">← Back to results</button>
  </div>
</main>

<footer>© 2026 Quill Inc. · <a>Status</a> · <a>Privacy</a></footer>

<script>
  // Tiny fixed corpus. Misspellings get zero results; no typo correction.
  const docs = [
    { t: "Getting Started", s: "Install Quill, configure your workspace, and write your first document.", tag: "guide" },
    { t: "Installation", s: "Install Quill via npm, yarn, or pnpm. Supports Node 18+.", tag: "guide" },
    { t: "Authentication", s: "Set up OAuth, API keys, and session tokens for the Quill API.", tag: "api" },
    { t: "Webhooks", s: "Receive real-time events from Quill into your backend.", tag: "api" },
    { t: "Rate limits", s: "Default API limits, burst behavior, and how to request more.", tag: "api" },
    { t: "Keyboard shortcuts", s: "All keyboard shortcuts available across the Quill editor.", tag: "guide" },
    { t: "Billing & invoices", s: "Manage your plan, payment method, and download invoices.", tag: "account" },
    { t: "Export to PDF", s: "Export any document as PDF, with custom headers and footers.", tag: "guide" },
    { t: "Markdown reference", s: "Full markdown syntax supported in the Quill editor.", tag: "guide" }
  ];

  const q = document.getElementById('q');
  const results = document.getElementById('results');
  const stats = document.getElementById('stats');
  const chips = document.querySelectorAll('.chip');
  const docview = document.getElementById('docview');
  let activeCat = 'all';

  function render(list) {
    results.innerHTML = '';
    stats.textContent = 'Showing ' + list.length + (list.length === 1 ? ' result' : ' results');
    // Bug-by-design: when list is empty, results just stays empty.
    // No "no results for X" message, no suggestions, no "did you mean".
    list.forEach(d => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = '<div class="t">' + d.t + '</div>' +
                     '<div class="s">' + d.s + '</div>' +
                     '<div class="meta">' + d.tag + '</div>';
      el.addEventListener('click', () => openDoc(d));
      results.appendChild(el);
    });
  }

  function openDoc(d) {
    results.style.display = 'none';
    document.getElementById('chips').style.display = 'none';
    stats.style.display = 'none';
    document.getElementById('dv-t').textContent = d.t;
    document.getElementById('dv-s').textContent = d.s + ' (full article would go here)';
    docview.style.display = 'block';
  }
  document.getElementById('dv-back').onclick = () => {
    docview.style.display = 'none';
    results.style.display = '';
    document.getElementById('chips').style.display = '';
    stats.style.display = '';
  };

  function search(term) {
    let pool = activeCat === 'all' ? docs : docs.filter(d => d.tag === activeCat);
    if (!term) { render(pool); return; }
    const t = term.toLowerCase();
    // Strict substring match — no typo tolerance, no fuzzy.
    const hits = pool.filter(d => d.t.toLowerCase().includes(t) || d.s.toLowerCase().includes(t));
    render(hits);
  }

  q.addEventListener('input', e => search(e.target.value));
  chips.forEach(c => c.addEventListener('click', () => {
    chips.forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    activeCat = c.dataset.cat;
    search(q.value);
  }));
  render(docs);
</script>
</body>
</html>
